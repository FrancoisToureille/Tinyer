<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>TINYER™ — Accueil</title>

    <style>
      body {
        margin: 0;
        background: #0a0a0f;
        color: #e8e8f0;
        font-family: 'Space Grotesk', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
      }

      /* Glow background */
      body::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at center,
          rgba(0, 255, 179, 0.1),
          transparent 70%
        );
      }

      /* Container */
      .container {
        z-index: 1;
      }

      /* Title */
      h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 5rem;
        letter-spacing: 0.1em;
      }

      .highlight {
        color: #00ffb3;
        text-shadow: 0 0 30px rgba(0, 255, 179, 0.5);
      }

      /* Subtitle */
      p {
        color: #5a5a7a;
        font-size: 1.2rem;
        margin-bottom: 2rem;
      }

      /* Button */
      .btn {
        display: inline-block;
        padding: 15px 30px;
        background: #00ffb3;
        color: #0a0a0f;
        text-decoration: none;
        font-weight: bold;
        letter-spacing: 0.1em;
        transition: 0.3s;
      }

      .btn:hover {
        box-shadow: 0 0 40px rgba(0, 255, 179, 0.6);
        transform: translateY(-2px);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>
        <span class="highlight">NOUVEAU</span><br />
        PRODUIT DISPONIBLE
      </h1>
      <img
        src="packaging.jpg"
        alt="TINYER™"
        style="width: 600px; margin: 20px 0"
      />

      <p>
        Découvrez le TINYER™, la technologie qui révolutionne le transport
        d’objets.
      </p>

      <a href="detail.html" class="btn">EN SAVOIR PLUS →</a>
    </div>
  </body>
</html>
